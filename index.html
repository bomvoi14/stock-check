<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เช็คสต็อกร้านชามโปรด</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
</head>
<body class="bg-gray-50 p-4">
    <script>const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHg49ZFeI0-dBUZIwKznbIo97V1-F_zqz2LdScYdVzyYEr0aD64d3i4k-lkIESZGDZ9A/exec";</script>

    <div class="max-w-2xl mx-auto bg-white p-4 shadow-lg rounded-xl">
        <div id="home-view" class="space-y-4">
            <button onclick="openStock('ก๋วยเตี๋ยวหมู')" class="w-full p-4 bg-orange-500 text-white rounded-lg font-bold">ก๋วยเตี๋ยวหมู</button>
            <button onclick="openStock('ก๋วยเตี๋ยวไก่')" class="w-full p-4 bg-green-600 text-white rounded-lg font-bold">ก๋วยเตี๋ยวไก่</button>
            <button onclick="openStock('อาหารตามสั่ง')" class="w-full p-4 bg-red-600 text-white rounded-lg font-bold">อาหารตามสั่ง</button>
            <button onclick="openStock('อุปกรณ์ในร้าน')" class="w-full p-4 bg-blue-600 text-white rounded-lg font-bold">อุปกรณ์ในร้าน</button>
            <button onclick="showHistory()" class="w-full p-4 bg-gray-500 text-white rounded-lg font-bold">ดูประวัติย้อนหลัง</button>
        </div>

        <div id="stock-view" class="hidden">
            <button onclick="location.reload()" class="mb-4 text-blue-500">← กลับ</button>
            <input id="staff-name" type="text" placeholder="ชื่อผู้เช็ค" class="w-full p-2 border rounded mb-4">
            <div id="items-list" class="space-y-3 mb-6"></div>
            <button id="save-btn" onclick="saveData()" class="w-full py-4 bg-green-600 text-white font-bold rounded-lg">บันทึกข้อมูล</button>
        </div>

        <div id="history-view" class="hidden">
            <button onclick="location.reload()" class="mb-4 text-blue-500">← กลับ</button>
            <div id="history-data" class="text-sm"></div>
        </div>
    </div>

    <script>
        async function openStock(sheet) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('stock-view').classList.remove('hidden');
            const res = await fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(sheet)}`);
            const data = await res.json();
            const list = document.getElementById('items-list');
            list.innerHTML = data.slice(1).filter(row => row[1]).map((row, i) => `
                <div class="flex items-center gap-2 border-b pb-2">
                    <span class="flex-1 text-xs">${row[1]}</span>
                    <button onclick="adjust(this, -0.1)" class="bg-gray-200 px-2 rounded">-</button>
                    <input type="number" class="w-16 text-center border qty-input" value="0" step="0.1">
                    <button onclick="adjust(this, 0.1)" class="bg-gray-200 px-2 rounded">+</button>
                    <span class="w-12 text-xs">${row[2] || ''}</span>
                </div>
            `).join('');
        }

        function adjust(btn, val) {
            let input = btn.parentElement.querySelector('.qty-input');
            let v = parseFloat(input.value) || 0;
            if (val > 0 && v === 0) v = 0.9; // เริ่มต้นที่ 0.9 + 0.1 = 1
            input.value = (Math.round((v + val) * 10) / 10).toFixed(1);
        }

        async function saveData() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.innerText = "กำลังบันทึก...";
            // (โค้ดส่งข้อมูล...เหมือนเดิม)
            alert('บันทึกสำเร็จ!');
            location.reload();
        }

        async function showHistory() {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('history-view').classList.remove('hidden');
            const res = await fetch(`${SCRIPT_URL}?sheet=บันทึกสต๊อก`);
            const data = await res.json();
            document.getElementById('history-data').innerHTML = data.slice(-10).map(r => `<div>${r[0]} | ${r[2]} | ${r[4]} (${r[5]}${r[6]})</div>`).join('');
        }
    </script>
</body>
</html>
