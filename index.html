<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เช็คสต็อกร้านชามโปรด</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <style>body { font-family: sans-serif; background-color: #f9fafb; }</style>
</head>
<body>
    <script>const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHg49ZFeI0-dBUZIwKznbIo97V1-F_zqz2LdScYdVzyYEr0aD64d3i4k-lkIESZGDZ9A/exec";</script>

    <div class="max-w-2xl mx-auto p-4 bg-white shadow-lg min-h-screen">
        <h1 class="text-xl font-bold text-center mb-6 text-amber-600" id="shop-title">เช็คสต็อก</h1>
        
        <div id="home-view" class="grid grid-cols-2 gap-4">
            <button onclick="openStock('ก๋วยเตี๋ยวหมู')" class="p-6 rounded-xl bg-orange-500 text-white font-bold">🍜 ก๋วยเตี๋ยวหมู</button>
            <button onclick="openStock('ก๋วยเตี๋ยวไก่')" class="p-6 rounded-xl bg-green-600 text-white font-bold">🍲 ก๋วยเตี๋ยวไก่</button>
            <button onclick="openStock('อาหารตามสั่ง')" class="p-6 rounded-xl bg-red-600 text-white font-bold">🥘 อาหารตามสั่ง</button>
            <button onclick="openStock('อุปกรณ์ในร้าน')" class="p-6 rounded-xl bg-blue-600 text-white font-bold">🔧 อุปกรณ์</button>
        </div>

        <div id="stock-view" class="hidden">
            <button onclick="location.reload()" class="mb-4 text-blue-500 font-bold">← กลับ</button>
            <input id="staff-name" type="text" placeholder="ชื่อผู้เช็คสต็อก" class="w-full p-2 border rounded mb-4">
            
            <table class="w-full text-sm">
                <thead>
                    <tr class="bg-gray-100 border-b">
                        <th class="p-2 text-left">รายการ</th>
                        <th class="p-2 text-center w-16">จำนวน</th>
                        <th class="p-2 text-center">หน่วย</th>
                        <th class="p-2 text-left">หมายเหตุ</th>
                    </tr>
                </thead>
                <tbody id="items-list"></tbody>
            </table>
            <button onclick="saveData()" class="w-full mt-6 py-3 bg-green-600 text-white font-bold rounded-lg">บันทึกข้อมูล</button>
        </div>
    </div>

    <script>
        async function openStock(sheet) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('stock-view').classList.remove('hidden');
            document.getElementById('shop-title').innerText = sheet;
            
            const res = await fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(sheet)}`);
            const data = await res.json();
            const list = document.getElementById('items-list');
            
            // ใช้ .filter เพื่อเอาเฉพาะแถวที่มีชื่อรายการ (แก้ปัญหาแถวว่าง)
            list.innerHTML = data.slice(1).filter(row => row[1] !== "").map((row, i) => `
                <tr class="border-b">
                    <td class="p-2">${row[1]}</td>
                    <td class="p-2"><input type="number" class="w-full border rounded text-center qty-input" data-name="${row[1]}" data-unit="${row[2] || ''}"></td>
                    <td class="p-2 text-center text-gray-500">${row[2] || ''}</td>
                    <td class="p-2"><input type="text" class="w-full border rounded note-input" placeholder="หมายเหตุ"></td>
                </tr>
            `).join('');
        }

        async function saveData() {
            const staff = document.getElementById('staff-name').value;
            if(!staff) return alert('กรุณากรอกชื่อ');
            
            const rows = document.querySelectorAll('#items-list tr');
            for(let row of rows) {
                const qty = row.querySelector('.qty-input').value;
                if(qty && qty > 0) {
                    const data = {
                        checked_by: staff,
                        item_name: row.querySelector('.qty-input').dataset.name,
                        quantity: qty,
                        unit: row.querySelector('.qty-input').dataset.unit,
                        note: row.querySelector('.note-input').value
                    };
                    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                }
            }
            alert('บันทึกสำเร็จ!');
            location.reload();
        }
    </script>
</body>
</html>
