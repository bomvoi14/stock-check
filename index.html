<script>
        // --- 1. ระบบพจนานุกรมแปลภาษา (UI Translation Dictionary) ---
        const i18n = {
            th: {
                title: "เช็คสต็อกร้านชามโปรด", menu1: "ก๋วยเตี๋ยวหมู", menu2: "ก๋วยเตี๋ยวไก่", menu3: "อาหารตามสั่ง", menu4: "อุปกรณ์ในร้าน",
                historyBtn: "ดูประวัติย้อนหลัง", back: "กลับหน้าเมนู", staffPlaceholder: "กรุณากรอกชื่อผู้เช็คสต็อก",
                colItem: "รายการ", colQty: "จำนวน", colUnit: "หน่วย", colNote: "หมายเหตุ", saveBtn: "บันทึกข้อมูล",
                saving: "กำลังบันทึกข้อมูล...", searchTitle: "ค้นหาประวัติย้อนหลัง", allShops: "-- ทุกร้าน --", allStaff: "-- ผู้เช็คทุกคน --",
                colShop: "ร้าน", colStaff: "ผู้บันทึก", loading: "กำลังโหลดข้อมูล...", noRecord: "ไม่พบรายการบันทึกตามเงื่อนไขที่เลือก"
            },
            la: {
                title: "ກວດສອບສະຕັອກຮ້ານຊາມໂປຣດ", menu1: "ເຝີໝູ", menu2: "ເຝີໄກ່", menu3: "ອາຫານຕາມສັ່ງ", menu4: "ອຸປະກອນໃນຮ້ານ",
                historyBtn: "ເບິ່ງປະຫວັດ", back: "ກັບຄືນໜ້າເມນູ", staffPlaceholder: "ກະລຸນາໃສ່ຊື່ຜູ້ກວດສະຕັອກ",
                colItem: "ລາຍການ", colQty: "ຈຳນວນ", colUnit: "ຫົວໜ່ວຍ", colNote: "ໝາຍເຫດ", saveBtn: "ບັນທຶກຂໍ້ມູນ",
                saving: "ກຳລັງບັນທຶກ...", searchTitle: "ຄົ້ນຫາປະຫວັດ", allShops: "-- ທຸກຮ້ານ --", allStaff: "-- ຜູ້ກວດທຸກຄົນ --",
                colShop: "ຮ້ານ", colStaff: "ຜູ້ບັນທຶກ", loading: "ກຳລັງໂຫຼດຂໍ້ມູນ...", noRecord: "ບໍ່ພົບລາຍການບັນທຶກ"
            },
            mm: {
                title: "စတော့ရှယ်ယာစစ်ဆေးပါ", menu1: "ဝက်သားခေါက်ဆွဲ", menu2: "ကြက်သားခေါက်ဆွဲ", menu3: "မှာယူရန်အစားအစာ", menu4: "ဆိုင်သုံးပစ္စည်းများ",
                historyBtn: "သမိုင်းကြည့်ပါ", back: "ပင်မမီနူးသို့ပြန်သွားရန်", staffPlaceholder: "စစ်ဆေးသူအမည်ထည့်ပါ",
                colItem: "အမည်", colQty: "အရေအတွက်", colUnit: "ယူနစ်", colNote: "မှတ်ချက်", saveBtn: "သိမ်းဆည်းပါ",
                saving: "သိမ်းဆည်းနေသည်...", searchTitle: "သမိုင်းရှာဖွေပါ", allShops: "-- ဆိုင်အားလုံး --", allStaff: "-- ဝန်ထမ်းအားလုံး --",
                colShop: "ဆိုင်", colStaff: "မှတ်တမ်းတင်သူ", loading: "ဒေတာကို ဖွင့်နေသည်...", noRecord: "မှတ်တမ်းမတွေ့ပါ"
            }
        };

        let currentLang = 'th';
        let unitTranslations = {}; 
        let isUnitLoaded = false;

        // แก้ไข: โหลดข้อมูลแปลภาษาแบบเช็คสถานะ
        async function getUnitTranslations() {
            if (isUnitLoaded) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?sheet=Translation`);
                const data = await res.json();
                data.slice(1).forEach(row => {
                    if (row[0]) {
                        unitTranslations[row[0]] = {
                            th: row[0],
                            la: row[2] || row[0], // คอลัมน์ C 
                            mm: row[3] || row[0]  // คอลัมน์ D 
                        };
                    }
                });
                isUnitLoaded = true;
            } catch (e) {
                console.error("Failed to load unit translations");
            }
        }
        
        // เรียกให้โหลดล่วงหน้าไว้ก่อน
        getUnitTranslations();

        function setLang(lang) {
            currentLang = lang;
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerText = i18n[lang][key];
            });
            document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                const key = el.getAttribute('data-i18n-ph');
                if (i18n[lang][key]) el.setAttribute('placeholder', i18n[lang][key]);
            });
            
            // อัปเดตภาษาสำหรับรายการวัตถุดิบและหน่วยที่ถูกสร้างไว้แล้ว
            document.querySelectorAll('.dyn-text').forEach(el => {
                el.innerText = el.getAttribute('data-' + lang) || el.getAttribute('data-th');
            });
            
            if(!document.getElementById('history-view').classList.contains('hidden')){
                filterHistory();
            }
        }

        let currentShop = "";

        async function openStock(sheet) {
            currentShop = sheet;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('stock-view').classList.remove('hidden');
            document.getElementById('items-list').innerHTML = `<tr><td colspan="4" class="text-center p-8 text-gray-400 font-bold text-lg"><span class="animate-pulse">${i18n[currentLang].loading}</span></td></tr>`;
            
            try {
                // บังคับให้รอโหลดคำแปลหน่วยให้เสร็จก่อน
                await getUnitTranslations();
                
                const res = await fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(sheet)}`);
                const data = await res.json();
                
                document.getElementById('items-list').innerHTML = data.slice(1).filter(r => r[1] && String(r[1]).trim() !== '').map((r, i) => {
                    const item = { th: r[1], la: r[4] || r[1], mm: r[5] || r[1] }; // E = ลาว, F = พม่า
                    const unitTh = r[2] || '';
                    const unit = {
                        th: unitTh,
                        la: unitTranslations[unitTh] ? unitTranslations[unitTh].la : unitTh,
                        mm: unitTranslations[unitTh] ? unitTranslations[unitTh].mm : unitTh
                    };

                    return `
                    <tr class="border-b border-gray-100 hover:bg-white transition-colors">
                        <td class="p-3 font-medium text-gray-800">
                            <span class="dyn-text" data-th="${item.th}" data-la="${item.la}" data-mm="${item.mm}">${item[currentLang]}</span>
                        </td>
                        <td class="p-3">
                            <div class="flex items-center justify-center gap-1 md:gap-2">
                                <button onclick="adj(this, -1)" class="w-8 h-8 md:w-10 md:h-10 bg-gray-100 text-gray-600 rounded-lg font-bold hover:bg-red-50 hover:text-red-600 hover:border-red-300 border border-gray-200 transition-all text-xl leading-none flex items-center justify-center shadow-sm">-</button>
                                <input type="number" min="0" oninput="if(this.value < 0) this.value = 0;" class="w-16 md:w-20 h-10 text-center border-2 border-gray-200 rounded-lg font-bold text-lg qty-input focus:border-amber-400 outline-none transition-colors" value="0.0" step="0.1" data-name="${item.th}" data-unit="${unit.th}">
                                <button onclick="adj(this, 1)" class="w-8 h-8 md:w-10 md:h-10 bg-gray-100 text-gray-600 rounded-lg font-bold hover:bg-green-50 hover:text-green-600 hover:border-green-300 border border-gray-200 transition-all text-xl leading-none flex items-center justify-center shadow-sm">+</button>
                            </div>
                        </td>
                        <td class="p-3 text-center text-gray-500 text-sm font-medium">
                            <span class="dyn-text" data-th="${unit.th}" data-la="${unit.la}" data-mm="${unit.mm}">${unit[currentLang]}</span>
                        </td>
                        <td class="p-3"><input type="text" class="w-full p-2 border border-gray-200 rounded-lg focus:border-amber-400 outline-none note-input bg-gray-50 focus:bg-white transition-colors"></td>
                    </tr>
                `}).join('');
            } catch (error) {
                document.getElementById('items-list').innerHTML = `<tr><td colspan="4" class="text-center p-4 text-red-500 font-bold">⚠️ Connection Error</td></tr>`;
            }
        }

        function adj(btn, val) {
            let input = btn.parentElement.querySelector('.qty-input');
            let v = parseFloat(input.value) || 0;
            let result = v + val;
            if (result < 0) result = 0; 
            input.value = result.toFixed(1);
        }

        async function saveData() {
            const staff = document.getElementById('staff-name').value.trim();
            if(!staff) {
                alert('⚠️ ' + i18n[currentLang].staffPlaceholder);
                document.getElementById('staff-name').focus();
                return;
            }

            const btn = document.getElementById('save-btn');
            btn.disabled = true; 
            btn.innerHTML = `⏳ <span data-i18n="saving">${i18n[currentLang].saving}</span>`;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            
            const rows = document.querySelectorAll('#items-list tr');
            const dataToSubmit = [];
            
            rows.forEach(r => {
                const qtyInput = r.querySelector('.qty-input');
                if (qtyInput) {
                    let q = parseFloat(qtyInput.value) || 0;
                    if(q > 0) {
                        dataToSubmit.push({ 
                            checked_by: staff, station: currentShop, category: "", 
                            item_name: qtyInput.dataset.name, 
                            quantity: q, 
                            unit: qtyInput.dataset.unit, 
                            note: r.querySelector('.note-input').value 
                        });
                    }
                }
            });

            if (dataToSubmit.length === 0) {
                alert('⚠️ ไม่มีรายการสินค้าที่ระบุจำนวน');
                btn.disabled = false;
                btn.innerHTML = `<span data-i18n="saveBtn">${i18n[currentLang].saveBtn}</span>`;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                return;
            }

            try {
                for(let item of dataToSubmit) {
                    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(item) });
                }
                alert('✅ Success!'); 
                location.reload();
            } catch (error) {
                alert('❌ Error saving data');
                btn.disabled = false;
                btn.innerHTML = `<span data-i18n="saveBtn">${i18n[currentLang].saveBtn}</span>`;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        async function showHistory() {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('history-view').classList.remove('hidden');
            document.getElementById('history-data').innerHTML = `<p class="text-center p-8 text-gray-400 font-bold"><span class="animate-pulse">${i18n[currentLang].loading}</span></p>`;
            
            try {
                await getUnitTranslations(); // บังคับรอโหลดคำแปลเผื่อไว้
                const res = await fetch(`${SCRIPT_URL}?sheet=บันทึกสต๊อก`);
                window.histData = await res.json();
                
                const shops = [...new Set(window.histData.slice(1).map(r => r[2]).filter(Boolean))];
                const staffs = [...new Set(window.histData.slice(1).map(r => r[1]).filter(Boolean))];
                
                document.getElementById('shop-filter').innerHTML = `<option value="" data-i18n="allShops">${i18n[currentLang].allShops}</option>` + shops.map(s => `<option value="${s}">${s}</option>`).join('');
                document.getElementById('staff-filter').innerHTML = `<option value="" data-i18n="allStaff">${i18n[currentLang].allStaff}</option>` + staffs.map(s => `<option value="${s}">${s}</option>`).join('');
                
                filterHistory();
            } catch (error) {
                document.getElementById('history-data').innerHTML = `<p class="text-center p-4 text-red-500 font-bold">⚠️ Connection Error</p>`;
            }
        }

        function filterHistory() {
            if (!window.histData || window.histData.length === 0) return;
            
            const dateVal = document.getElementById('date-picker').value;
            const shopVal = document.getElementById('shop-filter').value;
            const staffVal = document.getElementById('staff-filter').value;
            
            let filtered = window.histData.slice(1);

            if (dateVal) {
                const [y, m, d] = dateVal.split('-');
                const yThai = parseInt(y) + 543;
                const dateVariations = [ dateVal, `${d}/${m}/${y}`, `${m}/${d}/${y}`, `${d}/${m}/${yThai}` ];
                filtered = filtered.filter(r => r[0] && dateVariations.some(format => String(r[0]).includes(format)));
            }
            if (shopVal) filtered = filtered.filter(r => r[2] === shopVal);
            if (staffVal) filtered = filtered.filter(r => r[1] === staffVal);

            if (filtered.length > 0) {
                document.getElementById('history-data').innerHTML = `
                    <div class="overflow-x-auto rounded-xl border border-gray-200 shadow-sm mt-4">
                        <table class="w-full text-sm border-collapse bg-white">
                            <thead>
                                <tr class="bg-gray-100 text-gray-700">
                                    <th class="border-b p-3 text-center w-1/4 font-bold" data-i18n="colShop">${i18n[currentLang].colShop}</th>
                                    <th class="border-b p-3 text-center w-1/4 font-bold" data-i18n="colStaff">${i18n[currentLang].colStaff}</th>
                                    <th class="border-b p-3 text-left font-bold" data-i18n="colItem">${i18n[currentLang].colItem}</th>
                                    <th class="border-b p-3 text-center font-bold" data-i18n="colQty">${i18n[currentLang].colQty}</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${filtered.reverse().map((r, index) => {
                                    const itemTh = r[4] || r[2] || '-';
                                    const unitTh = r[6] || r[4] || '';
                                    const uLa = unitTranslations[unitTh] ? unitTranslations[unitTh].la : unitTh;
                                    const uMm = unitTranslations[unitTh] ? unitTranslations[unitTh].mm : unitTh;
                                    return `
                                    <tr class="${index % 2 === 0 ? 'bg-white' : 'bg-gray-50'} hover:bg-amber-50 transition-colors">
                                        <td class="border-b p-3 text-center font-medium text-amber-700">${r[2] || '-'}</td>
                                        <td class="border-b p-3 text-center text-gray-700">${r[1] || '-'}</td>
                                        <td class="border-b p-3">
                                            <div class="font-bold text-gray-800 dyn-text" data-th="${itemTh}" data-la="${itemTh}" data-mm="${itemTh}">${itemTh}</div>
                                            <div class="text-xs text-gray-500 mt-1">${r[7] || r[5] || ''}</div>
                                        </td>
                                        <td class="border-b p-3 text-center font-black text-lg text-green-600">${r[5] || r[3] || '0'} <span class="text-xs font-normal text-gray-500 dyn-text" data-th="${unitTh}" data-la="${uLa}" data-mm="${uMm}">${currentLang === 'la' ? uLa : currentLang === 'mm' ? uMm : unitTh}</span></td>
                                    </tr>
                                `}).join('')}
                            </tbody>
                        </table>
                    </div>`;
            } else {
                document.getElementById('history-data').innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-xl p-6 text-center mt-4 shadow-inner">
                        <p class="text-red-500 font-bold text-lg">⚠️ ${i18n[currentLang].noRecord}</p>
                    </div>`;
            }
        }
        
        setLang('th');
    </script>
