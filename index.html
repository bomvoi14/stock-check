<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เช็คสต็อกร้านชามโปรด</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #fdf6e3; }
        input[type=number]::-webkit-inner-spin-button { opacity: 1; }
    </style>
</head>
<body class="p-4 md:p-8 relative">
    <script>const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHg49ZFeI0-dBUZIwKznbIo97V1-F_zqz2LdScYdVzyYEr0aD64d3i4k-lkIESZGDZ9A/exec";</script>

    <!-- Modal ยืนยันการบันทึก -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl border-t-8 border-amber-500 transform scale-100 transition-transform">
            <h3 class="text-xl font-bold text-amber-700 mb-4 text-center" data-i18n="confirmTitle">สรุปรายการที่แก้ไข</h3>
            <div id="confirm-list" class="max-h-60 overflow-y-auto mb-6 space-y-2 text-sm border p-3 rounded-xl bg-gray-50 shadow-inner">
            </div>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 p-3 border-2 border-gray-300 text-gray-600 rounded-xl font-bold hover:bg-gray-100 transition-colors" data-i18n="editBtn">กลับไปแก้ไข</button>
                <button id="confirm-save-btn" onclick="executeSave()" class="flex-1 p-3 bg-amber-500 text-white rounded-xl font-bold hover:bg-amber-600 shadow-md transition-colors" data-i18n="confirmBtn">ยืนยันบันทึก</button>
            </div>
        </div>
    </div>

    <div class="max-w-3xl mx-auto bg-white p-6 shadow-2xl rounded-2xl border-t-8 border-amber-500">
        
        <!-- แถบเลือกภาษา -->
        <div class="flex justify-end gap-2 mb-6 border-b pb-4 border-gray-100">
            <button onclick="setLang('th')" class="px-4 py-2 border-2 border-gray-200 rounded-lg bg-white text-gray-700 hover:border-amber-500 hover:text-amber-600 font-bold transition-all shadow-sm focus:ring-2 focus:ring-amber-200">TH ไทย</button>
            <button onclick="setLang('la')" class="px-4 py-2 border-2 border-gray-200 rounded-lg bg-white text-gray-700 hover:border-amber-500 hover:text-amber-600 font-bold transition-all shadow-sm focus:ring-2 focus:ring-amber-200">LA ລາວ</button>
            <button onclick="setLang('mm')" class="px-4 py-2 border-2 border-gray-200 rounded-lg bg-white text-gray-700 hover:border-amber-500 hover:text-amber-600 font-bold transition-all shadow-sm focus:ring-2 focus:ring-amber-200">MM မြန်မာ</button>
        </div>

        <!-- เมนูหลัก -->
        <div id="home-view" class="space-y-4">
            <h2 data-i18n="title" class="font-bold text-center mb-6 text-2xl text-amber-600">เช็คสต็อกร้านชามโปรด</h2>
            <button onclick="openStock('ก๋วยเตี๋ยวหมู')" class="w-full p-5 bg-amber-500 text-white rounded-xl font-bold text-xl shadow-md hover:bg-amber-600 transform hover:scale-[1.02] transition-all flex items-center gap-3">🍜 <span data-i18n="menu1">ก๋วยเตี๋ยวหมู</span></button>
            <button onclick="openStock('ก๋วยเตี๋ยวไก่')" class="w-full p-5 bg-green-600 text-white rounded-xl font-bold text-xl shadow-md hover:bg-green-700 transform hover:scale-[1.02] transition-all flex items-center gap-3">🍲 <span data-i18n="menu2">ก๋วยเตี๋ยวไก่</span></button>
            <button onclick="openStock('อาหารตามสั่ง')" class="w-full p-5 bg-orange-600 text-white rounded-xl font-bold text-xl shadow-md hover:bg-orange-700 transform hover:scale-[1.02] transition-all flex items-center gap-3">🥘 <span data-i18n="menu3">อาหารตามสั่ง</span></button>
            <button onclick="openStock('อุปกรณ์ในร้าน')" class="w-full p-5 bg-blue-600 text-white rounded-xl font-bold text-xl shadow-md hover:bg-blue-700 transform hover:scale-[1.02] transition-all flex items-center gap-3">🔧 <span data-i18n="menu4">อุปกรณ์ในร้าน</span></button>
            
            <div class="pt-4 border-t mt-6">
                <button onclick="showHistory()" class="w-full p-4 bg-amber-100 text-amber-800 rounded-xl font-bold text-lg hover:bg-amber-200 transition-all flex items-center justify-center gap-2">🕒 <span data-i18n="historyBtn">ดูประวัติย้อนหลัง</span></button>
            </div>
        </div>

        <!-- หน้าเช็คสต็อก -->
        <div id="stock-view" class="hidden">
            <div class="flex items-center mb-6 pb-4 border-b border-amber-100">
                <button onclick="location.reload()" class="text-amber-600 font-bold flex items-center gap-1 hover:bg-amber-50 px-3 py-2 rounded-lg transition-all">← <span data-i18n="back">กลับ</span></button>
                <h2 id="stock-page-title" class="text-xl md:text-2xl font-bold text-amber-700 flex-1 text-center pr-16"></h2>
            </div>
            
            <div id="stock-alert" class="hidden mb-6 p-4 bg-yellow-50 border border-yellow-200 text-yellow-800 rounded-xl shadow-sm text-center md:text-left text-sm md:text-base"></div>

            <input id="staff-name" type="text" data-i18n-ph="staffPlaceholder" placeholder="กรุณากรอกชื่อผู้เช็คสต็อก" class="w-full p-4 border-2 border-amber-300 rounded-xl mb-6 font-bold text-center text-lg focus:ring-4 focus:ring-amber-100 outline-none">
            
            <div class="overflow-x-auto bg-amber-50/30 rounded-xl p-2 border border-gray-100">
                <table class="w-full text-sm border-collapse">
                    <thead>
                        <tr class="bg-amber-100 text-amber-900 rounded-t-xl">
                            <th data-i18n="colItem" class="p-3 text-left w-1/3 rounded-tl-lg font-bold">รายการ</th>
                            <th data-i18n="colQty" class="p-3 text-center font-bold">จำนวน</th>
                            <th data-i18n="colUnit" class="p-3 text-center w-1/6 font-bold">หน่วย</th>
                            <th data-i18n="colNote" class="p-3 text-left w-1/4 rounded-tr-lg font-bold">หมายเหตุ</th>
                        </tr>
                    </thead>
                    <tbody id="items-list"></tbody>
                </table>
            </div>
            <button onclick="prepareSave()" class="w-full py-4 mt-6 bg-amber-500 hover:bg-amber-600 text-white rounded-xl font-bold text-xl shadow-lg transition-all flex justify-center items-center gap-2"><span data-i18n="saveBtn">บันทึกข้อมูล</span></button>
        </div>

        <!-- หน้าประวัติย้อนหลัง -->
        <div id="history-view" class="hidden">
            <div class="flex items-center mb-6 pb-4 border-b border-amber-100">
                <button onclick="location.reload()" class="text-amber-600 font-bold flex items-center gap-1 hover:bg-amber-50 px-3 py-2 rounded-lg transition-all">← <span data-i18n="back">กลับ</span></button>
                <h2 class="text-xl md:text-2xl font-bold text-amber-700 flex-1 text-center pr-16" data-i18n="searchTitle">ค้นหาประวัติย้อนหลัง</h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6 bg-gray-50 p-4 rounded-xl border">
                <input type="date" id="date-picker" onchange="filterHistory()" class="w-full p-3 border rounded-lg text-center font-medium focus:border-amber-400 outline-none">
                <select id="shop-filter" onchange="filterHistory()" class="w-full p-3 border rounded-lg text-center font-medium focus:border-amber-400 outline-none">
                    <option value="" data-i18n="allShops">-- ทุกร้าน --</option>
                </select>
                <select id="staff-filter" onchange="filterHistory()" class="w-full p-3 border rounded-lg text-center font-medium focus:border-amber-400 outline-none">
                    <option value="" data-i18n="allStaff">-- ผู้เช็คทุกคน --</option>
                </select>
            </div>
            
            <div id="history-data" class="text-sm mt-4"></div>
        </div>
    </div>

    <script>
        const i18n = {
            th: {
                title: "เช็คสต็อกร้านชามโปรด", menu1: "ก๋วยเตี๋ยวหมู", menu2: "ก๋วยเตี๋ยวไก่", menu3: "อาหารตามสั่ง", menu4: "อุปกรณ์ในร้าน",
                historyBtn: "ดูประวัติย้อนหลัง", back: "กลับ", staffPlaceholder: "กรุณากรอกชื่อผู้เช็คสต็อก",
                colItem: "รายการ", colQty: "จำนวน", colUnit: "หน่วย", colNote: "หมายเหตุ", saveBtn: "บันทึกข้อมูล",
                saving: "กำลังบันทึกข้อมูล...", searchTitle: "ประวัติย้อนหลัง", allShops: "-- ทุกร้าน --", allStaff: "-- ผู้เช็คทุกคน --",
                colShop: "ร้าน", colStaff: "ผู้บันทึก", loading: "กำลังโหลดข้อมูล...", noRecord: "ไม่พบรายการบันทึกตามเงื่อนไขที่เลือก",
                confirmTitle: "สรุปรายการที่แก้ไข", editBtn: "กลับไปแก้ไข", confirmBtn: "ยืนยันบันทึก", noChange: "ไม่มีการแก้ไขข้อมูล",
                catOthers: "หมวดหมู่ทั่วไป"
            },
            la: {
                title: "ກວດສອບສະຕັອກຮ້ານຊາມໂປຣດ", menu1: "ເຝີໝູ", menu2: "ເຝີໄກ່", menu3: "ອາຫານຕາມສັ່ງ", menu4: "ອຸປະກອນໃນຮ້ານ",
                historyBtn: "ເບິ່ງປະຫວັດ", back: "ກັບຄືນ", staffPlaceholder: "ກະລຸນາໃສ່ຊື່ຜູ້ກວດສະຕັອກ",
                colItem: "ລາຍການ", colQty: "ຈຳນວນ", colUnit: "ຫົວໜ່ວຍ", colNote: "ໝາຍເຫດ", saveBtn: "ບັນທຶກຂໍ້ມູນ",
                saving: "ກຳລັງບັນທຶກ...", searchTitle: "ປະຫວັດຍ້ອນຫຼັງ", allShops: "-- ທຸກຮ້ານ --", allStaff: "-- ຜູ້ກວດທຸກຄົນ --",
                colShop: "ຮ້ານ", colStaff: "ຜູ້ບັນທຶກ", loading: "ກຳລັງໂຫຼດຂໍ້ມູນ...", noRecord: "ບໍ່ພົບລາຍການບັນທຶກ",
                confirmTitle: "ສະຫຼຸບລາຍການທີ່ແກ້ໄຂ", editBtn: "ກັບໄປແກ້ໄຂ", confirmBtn: "ຢືນຢັນບັນທຶກ", noChange: "ບໍ່ມີການແກ້ໄຂຂໍ້ມູນ",
                catOthers: "ໝວດໝູ່ທົ່ວໄປ"
            },
            mm: {
                title: "စတော့ရှယ်ယာစစ်ဆေးပါ", menu1: "ဝက်သားခေါက်ဆွဲ", menu2: "ကြက်သားခေါက်ဆွဲ", menu3: "မှာယူရန်အစားအစာ", menu4: "ဆိုင်သုံးပစ္စည်းများ",
                historyBtn: "သမိုင်းကြည့်ပါ", back: "ပြန်သွားရန်", staffPlaceholder: "စစ်ဆေးသူအမည်ထည့်ပါ",
                colItem: "အမည်", colQty: "အရေအတွက်", colUnit: "ယူနစ်", colNote: "မှတ်ချက်", saveBtn: "သိမ်းဆည်းပါ",
                saving: "သိမ်းဆည်းနေသည်...", searchTitle: "သမိုင်းရှာဖွေပါ", allShops: "-- ဆိုင်အားလုံး --", allStaff: "-- ဝန်ထမ်းအားလုံး --",
                colShop: "ဆိုင်", colStaff: "မှတ်တမ်းတင်သူ", loading: "ဒေတာကို ဖွင့်နေသည်...", noRecord: "မှတ်တမ်းမတွေ့ပါ",
                confirmTitle: "ပြင်ဆင်ထားသော စာရင်းအကျဉ်းချုပ်", editBtn: "တည်းဖြတ်ရန် ပြန်သွားပါ", confirmBtn: "အတည်ပြုသိမ်းဆည်းပါ", noChange: "ပြောင်းလဲမှုမရှိပါ",
                catOthers: "အထွေထွေအမျိုးအစား"
            }
        };

        const menuKeys = {
            'ก๋วยเตี๋ยวหมู': 'menu1',
            'ก๋วยเตี๋ยวไก่': 'menu2',
            'อาหารตามสั่ง': 'menu3',
            'อุปกรณ์ในร้าน': 'menu4'
        };

        let currentLang = 'th';
        let globalTranslations = {}; 
        let isLoaded = false;
        let pendingDataToSubmit = []; 

        async function getTranslations() {
            if (isLoaded) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?sheet=Translation`);
                const data = await res.json();
                
                data.slice(1).forEach(row => {
                    const thKey = row[1] ? String(row[1]).trim() : ''; 
                    const unitLa = row[2] ? String(row[2]).trim() : ''; 
                    const unitMm = row[3] ? String(row[3]).trim() : ''; 
                    const itemLa = row[4] ? String(row[4]).trim() : ''; 
                    const itemMm = row[5] ? String(row[5]).trim() : ''; 
                    
                    if (thKey) {
                        globalTranslations[thKey] = { 
                            la: itemLa || unitLa || thKey, 
                            mm: itemMm || unitMm || thKey 
                        };
                    }
                });
                isLoaded = true;
            } catch (e) { console.error("Failed to load translations", e); }
        }
        
        getTranslations();

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerText = i18n[lang][key];
            });
            document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                const key = el.getAttribute('data-i18n-ph');
                if (i18n[lang][key]) el.setAttribute('placeholder', i18n[lang][key]);
            });
            document.querySelectorAll('.dyn-text').forEach(el => {
                el.innerText = el.getAttribute('data-' + lang) || el.getAttribute('data-th');
            });
            
            const alertEl = document.getElementById('stock-alert');
            if (!alertEl.classList.contains('hidden')) {
                const staff = alertEl.getAttribute('data-staff') || '';
                let msg = '';
                if(lang === 'la') msg = `⚠️ ມື້ນີ້ມີການກວດສະຕັອກໄປແລ້ວ ຫຼ້າສຸດໂດຍ <b>${staff}</b>`;
                else if(lang === 'mm') msg = `⚠️ ယနေ့ စတော့ရှယ်ယာစစ်ဆေးပြီးပါပြီ၊ နောက်ဆုံးစစ်ဆေးသူ <b>${staff}</b>`;
                else msg = `⚠️ วันนี้มีการเช็คสต็อกไปแล้ว ล่าสุดโดย <b>${staff}</b>`;
                alertEl.innerHTML = msg;
            }

            if(!document.getElementById('history-view').classList.contains('hidden')){
                filterHistory();
            }
        }

        let currentShop = "";

        async function openStock(sheet) {
            currentShop = sheet;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('stock-view').classList.remove('hidden');
            
            document.getElementById('stock-alert').classList.add('hidden');
            document.getElementById('staff-name').value = '';

            const mKey = menuKeys[sheet];
            const titleLa = i18n.la[mKey] || sheet;
            const titleMm = i18n.mm[mKey] || sheet;
            document.getElementById('stock-page-title').innerHTML = `<span class="dyn-text" data-th="${sheet}" data-la="${titleLa}" data-mm="${titleMm}">${i18n[currentLang][mKey] || sheet}</span>`;

            document.getElementById('items-list').innerHTML = `<tr><td colspan="4" class="text-center p-8 text-gray-400 font-bold text-lg"><span class="animate-pulse">${i18n[currentLang].loading}</span></td></tr>`;
            
            try {
                await getTranslations(); 
                
                const [resTemplate, resHist] = await Promise.all([
                    fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(sheet)}`),
                    fetch(`${SCRIPT_URL}?sheet=บันทึกสต๊อก`)
                ]);
                
                const templateData = await resTemplate.json();
                const histDataFull = await resHist.json();
                
                const validHist = histDataFull.slice(1).filter(r => r[0] && String(r[0]).trim() !== '');
                
                const d = new Date();
                const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
                const todayVariations = [`${y}-${m}-${day}`, `${day}/${m}/${y}`, `${m}/${day}/${y}`, `${day}/${m}/${y+543}`];
                
                const todaysHistory = validHist.filter(r => r[2] === sheet && todayVariations.some(v => String(r[0]).includes(v)));
                
                const latestToday = {};
                let lastStaff = "";
                
                todaysHistory.forEach(r => {
                    let itemName = String(r[4]).trim();
                    latestToday[itemName] = {
                        qty: parseFloat(r[5]) || 0,
                        note: r[7] || '',
                    };
                    lastStaff = r[1] || ''; 
                });

                const alertEl = document.getElementById('stock-alert');
                if (Object.keys(latestToday).length > 0) {
                    alertEl.setAttribute('data-staff', lastStaff);
                    alertEl.classList.remove('hidden');
                    let msg = '';
                    if(currentLang === 'la') msg = `⚠️ ມື້ນີ້ມີການກວດສະຕັອກໄປແລ້ວ ຫຼ້າສຸດໂດຍ <b>${lastStaff}</b>`;
                    else if(currentLang === 'mm') msg = `⚠️ ယနေ့ စတော့ရှယ်ယာစစ်ဆေးပြီးပါပြီ၊ နောက်ဆုံးစစ်ဆေးသူ <b>${lastStaff}</b>`;
                    else msg = `⚠️ วันนี้มีการเช็คสต็อกไปแล้ว ล่าสุดโดย <b>${lastStaff}</b>`;
                    alertEl.innerHTML = msg;
                    document.getElementById('staff-name').value = lastStaff; 
                }
                
                let currentCategory = "";
                let htmlContent = "";

                templateData.slice(1)
                    .filter(r => r[1] && String(r[1]).trim() !== '') 
                    .forEach((r, i) => {
                        // ดึงข้อมูลหมวดหมู่จากคอลัมน์ A (r[0])
                        let catTh = r[0] ? String(r[0]).trim() : i18n.th.catOthers;
                        
                        // ถ้าเจอหมวดหมู่ใหม่ ให้สร้างแถว Header คั่น
                        if (catTh !== currentCategory) {
                            currentCategory = catTh;
                            
                            // หาวิธีแปลชื่อหมวดหมู่ (ถ้ามีในพจนานุกรม)
                            let cLa = globalTranslations[catTh] ? globalTranslations[catTh].la : (catTh === i18n.th.catOthers ? i18n.la.catOthers : catTh);
                            let cMm = globalTranslations[catTh] ? globalTranslations[catTh].mm : (catTh === i18n.th.catOthers ? i18n.mm.catOthers : catTh);
                            
                            let displayCat = currentLang === 'la' ? cLa : currentLang === 'mm' ? cMm : catTh;
                            
                            htmlContent += `
                                <tr class="bg-amber-100/60 border-y-2 border-amber-200">
                                    <td colspan="4" class="p-3 font-bold text-amber-800">
                                        <span class="dyn-text" data-th="${catTh}" data-la="${cLa}" data-mm="${cMm}">📁 ${displayCat}</span>
                                    </td>
                                </tr>
                            `;
                        }

                        const thName = String(r[1]).trim();
                        let iLa = r[4] ? String(r[4]).trim() : '';
                        let iMm = r[5] ? String(r[5]).trim() : '';
                        
                        if (!iLa && globalTranslations[thName]) iLa = globalTranslations[thName].la;
                        if (!iMm && globalTranslations[thName]) iMm = globalTranslations[thName].mm;
                        
                        const item = { th: thName, la: iLa || thName, mm: iMm || thName };
                        globalTranslations[thName] = { la: item.la, mm: item.mm };
                        
                        const unitTh = r[2] ? String(r[2]).trim() : '';
                        const unit = {
                            th: unitTh,
                            la: globalTranslations[unitTh] ? globalTranslations[unitTh].la : unitTh,
                            mm: globalTranslations[unitTh] ? globalTranslations[unitTh].mm : unitTh
                        };

                        const prevData = latestToday[thName] || { qty: 0.0, note: '' };
                        const qtyVal = prevData.qty.toFixed(1);
                        const noteVal = prevData.note.replace(/"/g, '&quot;');

                        htmlContent += `
                        <tr class="border-b border-gray-100 hover:bg-white transition-colors">
                            <td class="p-3 font-medium text-gray-800">
                                <span class="dyn-text" data-th="${item.th}" data-la="${item.la}" data-mm="${item.mm}">${item[currentLang]}</span>
                            </td>
                            <td class="p-3">
                                <div class="flex items-center justify-center gap-1 md:gap-2">
                                    <button onclick="adj(this, -1)" class="w-8 h-8 md:w-10 md:h-10 bg-gray-100 text-gray-600 rounded-lg font-bold hover:bg-red-50 hover:text-red-600 hover:border-red-300 border border-gray-200 transition-all text-xl leading-none flex items-center justify-center shadow-sm">-</button>
                                    <input type="number" min="0" oninput="if(this.value < 0) this.value = 0; checkEdit(this);" class="w-16 md:w-20 h-10 text-center border-2 border-gray-200 rounded-lg font-bold text-lg qty-input focus:border-amber-400 outline-none transition-colors text-gray-800" value="${qtyVal}" step="0.1" data-orig="${qtyVal}" data-name="${item.th}" data-unit="${unit.th}" data-category="${catTh}">
                                    <button onclick="adj(this, 1)" class="w-8 h-8 md:w-10 md:h-10 bg-gray-100 text-gray-600 rounded-lg font-bold hover:bg-green-50 hover:text-green-600 hover:border-green-300 border border-gray-200 transition-all text-xl leading-none flex items-center justify-center shadow-sm">+</button>
                                </div>
                            </td>
                            <td class="p-3 text-center text-gray-500 text-sm font-medium">
                                <span class="dyn-text" data-th="${unit.th}" data-la="${unit.la}" data-mm="${unit.mm}">${unit[currentLang]}</span>
                            </td>
                            <td class="p-3"><input type="text" class="w-full p-2 border border-gray-200 rounded-lg focus:border-amber-400 outline-none note-input bg-gray-50 focus:bg-white transition-colors" value="${noteVal}"></td>
                        </tr>
                        `;
                    });
                
                document.getElementById('items-list').innerHTML = htmlContent;

            } catch (error) {
                document.getElementById('items-list').innerHTML = `<tr><td colspan="4" class="text-center p-4 text-red-500 font-bold">⚠️ Connection Error</td></tr>`;
            }
        }

        function checkEdit(input) {
            let orig = parseFloat(input.dataset.orig) || 0;
            let current = parseFloat(input.value) || 0;
            if (current !== orig) {
                input.classList.remove('text-gray-800');
                input.classList.add('text-red-600');
            } else {
                input.classList.remove('text-red-600');
                input.classList.add('text-gray-800');
            }
        }

        function adj(btn, val) {
            let input = btn.parentElement.querySelector('.qty-input');
            let v = parseFloat(input.value) || 0;
            let result = v + val;
            if (result < 0) result = 0; 
            input.value = result.toFixed(1);
            checkEdit(input); 
        }

        function prepareSave() {
            const staff = document.getElementById('staff-name').value.trim();
            if(!staff) {
                alert('⚠️ ' + i18n[currentLang].staffPlaceholder);
                document.getElementById('staff-name').focus();
                return;
            }

            pendingDataToSubmit = [];
            let htmlList = '';
            const rows = document.querySelectorAll('#items-list tr');
            
            rows.forEach(r => {
                const qtyInput = r.querySelector('.qty-input');
                if (qtyInput) {
                    let q = parseFloat(qtyInput.value) || 0;
                    let orig = parseFloat(qtyInput.dataset.orig) || 0;
                    
                    if(q !== orig) {
                        let name = qtyInput.dataset.name;
                        let unit = qtyInput.dataset.unit;
                        let cat = qtyInput.dataset.category; // รับค่าหมวดหมู่เพื่อส่งไปเก็บด้วย
                        
                        const iLa = globalTranslations[name] ? globalTranslations[name].la : name;
                        const iMm = globalTranslations[name] ? globalTranslations[name].mm : name;
                        const dName = currentLang === 'la' ? iLa : currentLang === 'mm' ? iMm : name;

                        const uLa = globalTranslations[unit] ? globalTranslations[unit].la : unit;
                        const uMm = globalTranslations[unit] ? globalTranslations[unit].mm : unit;
                        const dUnit = currentLang === 'la' ? uLa : currentLang === 'mm' ? uMm : unit;

                        pendingDataToSubmit.push({ 
                            checked_by: staff, station: currentShop, category: cat, 
                            item_name: name, 
                            quantity: q, unit: unit, note: r.querySelector('.note-input').value 
                        });
                        
                        htmlList += `
                            <div class="flex justify-between items-center border-b border-gray-200 pb-2 last:border-0 last:pb-0">
                                <span class="font-medium text-gray-700">${dName}</span>
                                <div class="text-right">
                                    <span class="text-gray-400 line-through text-xs mr-1">${orig}</span>
                                    <span class="font-bold text-red-600 text-base">${q} <span class="text-xs font-normal text-gray-600">${dUnit}</span></span>
                                </div>
                            </div>`;
                    }
                }
            });

            if (pendingDataToSubmit.length === 0) {
                alert('⚠️ ' + i18n[currentLang].noChange);
                return;
            }

            document.getElementById('confirm-list').innerHTML = htmlList;
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('confirm-modal').classList.add('hidden');
        }

        async function executeSave() {
            const btn = document.getElementById('confirm-save-btn');
            btn.disabled = true; 
            btn.innerHTML = `⏳ <span data-i18n="saving">${i18n[currentLang].saving}</span>`;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            try {
                for(let item of pendingDataToSubmit) {
                    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(item) });
                }
                alert('✅ บันทึกสำเร็จ / Success!'); 
                location.reload();
            } catch (error) {
                alert('❌ Error saving data');
                btn.disabled = false;
                btn.innerHTML = `<span data-i18n="confirmBtn">${i18n[currentLang].confirmBtn}</span>`;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                closeModal();
            }
        }

        async function showHistory() {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('history-view').classList.remove('hidden');
            document.getElementById('history-data').innerHTML = `<p class="text-center p-8 text-gray-400 font-bold"><span class="animate-pulse">${i18n[currentLang].loading}</span></p>`;
            
            try {
                await getTranslations();
                const res = await fetch(`${SCRIPT_URL}?sheet=บันทึกสต๊อก`);
                const rawData = await res.json();
                
                window.histData = [rawData[0], ...rawData.slice(1).filter(r => r[0] && String(r[0]).trim() !== '')];
                
                const shops = [...new Set(window.histData.slice(1).map(r => r[2]).filter(Boolean))];
                const staffs = [...new Set(window.histData.slice(1).map(r => r[1]).filter(Boolean))];
                
                document.getElementById('shop-filter').innerHTML = `<option value="" data-i18n="allShops">${i18n[currentLang].allShops}</option>` + shops.map(s => `<option value="${s}">${s}</option>`).join('');
                document.getElementById('staff-filter').innerHTML = `<option value="" data-i18n="allStaff">${i18n[currentLang].allStaff}</option>` + staffs.map(s => `<option value="${s}">${s}</option>`).join('');
                
                filterHistory();
            } catch (error) {
                document.getElementById('history-data').innerHTML = `<p class="text-center p-4 text-red-500 font-bold">⚠️ Connection Error</p>`;
            }
        }

        function filterHistory() {
            if (!window.histData || window.histData.length <= 1) {
                document.getElementById('history-data').innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-xl p-6 text-center mt-4 shadow-inner">
                        <p class="text-red-500 font-bold text-lg">⚠️ ${i18n[currentLang].noRecord}</p>
                    </div>`;
                return;
            }
            
            const uniqueMap = new Map();
            window.histData.slice(1).forEach(r => {
                let rawDate = String(r[0]);
                let dateKey = rawDate.includes('T') ? rawDate.split('T')[0] : rawDate.split(' ')[0];
                let shop = r[2] || '';
                let item = r[4] || '';
                let key = `${dateKey}_${shop}_${item}`;
                uniqueMap.set(key, r);
            });
            
            let filtered = Array.from(uniqueMap.values());

            const dateVal = document.getElementById('date-picker').value;
            const shopVal = document.getElementById('shop-filter').value;
            const staffVal = document.getElementById('staff-filter').value;

            if (dateVal) {
                const [y, m, d] = dateVal.split('-');
                const yThai = parseInt(y) + 543;
                const dateVariations = [ dateVal, `${d}/${m}/${y}`, `${m}/${d}/${y}`, `${d}/${m}/${yThai}` ];
                filtered = filtered.filter(r => r[0] && dateVariations.some(format => String(r[0]).includes(format)));
            }
            if (shopVal) filtered = filtered.filter(r => r[2] === shopVal);
            if (staffVal) filtered = filtered.filter(r => r[1] === staffVal);

            if (filtered.length > 0) {
                document.getElementById('history-data').innerHTML = `
                    <div class="overflow-x-auto rounded-xl border border-gray-200 shadow-sm mt-4">
                        <table class="w-full text-sm border-collapse bg-white">
                            <thead>
                                <tr class="bg-gray-100 text-gray-700">
                                    <th class="border-b p-3 text-center w-1/4 font-bold" data-i18n="colShop">${i18n[currentLang].colShop}</th>
                                    <th class="border-b p-3 text-center w-1/4 font-bold" data-i18n="colStaff">${i18n[currentLang].colStaff}</th>
                                    <th class="border-b p-3 text-left font-bold" data-i18n="colItem">${i18n[currentLang].colItem}</th>
                                    <th class="border-b p-3 text-center font-bold" data-i18n="colQty">${i18n[currentLang].colQty}</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${filtered.reverse().map((r, index) => {
                                    const itemTh = r[4] ? String(r[4]).trim() : (r[2] ? String(r[2]).trim() : '-');
                                    const unitTh = r[6] ? String(r[6]).trim() : (r[4] ? String(r[4]).trim() : '');
                                    
                                    const iLa = globalTranslations[itemTh] ? globalTranslations[itemTh].la : itemTh;
                                    const iMm = globalTranslations[itemTh] ? globalTranslations[itemTh].mm : itemTh;
                                    const uLa = globalTranslations[unitTh] ? globalTranslations[unitTh].la : unitTh;
                                    const uMm = globalTranslations[unitTh] ? globalTranslations[unitTh].mm : unitTh;
                                    
                                    return `
                                    <tr class="${index % 2 === 0 ? 'bg-white' : 'bg-gray-50'} hover:bg-amber-50 transition-colors">
                                        <td class="border-b p-3 text-center font-medium text-amber-700">${r[2] || '-'}</td>
                                        <td class="border-b p-3 text-center text-gray-700">${r[1] || '-'}</td>
                                        <td class="border-b p-3">
                                            <div class="font-bold text-gray-800 dyn-text" data-th="${itemTh}" data-la="${iLa}" data-mm="${iMm}">${currentLang === 'la' ? iLa : currentLang === 'mm' ? iMm : itemTh}</div>
                                            <!-- แสดงหมายเหตุใต้ชื่อสินค้า (ถ้ามี) -->
                                            <div class="text-xs text-gray-500 mt-1">${r[7] ? r[7] : ''}</div>
                                        </td>
                                        <td class="border-b p-3 text-center font-black text-lg text-green-600">${r[5] || r[3] || '0'} <span class="text-xs font-normal text-gray-500 dyn-text" data-th="${unitTh}" data-la="${uLa}" data-mm="${uMm}">${currentLang === 'la' ? uLa : currentLang === 'mm' ? uMm : unitTh}</span></td>
                                    </tr>
                                `}).join('')}
                            </tbody>
                        </table>
                    </div>`;
            } else {
                document.getElementById('history-data').innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-xl p-6 text-center mt-4 shadow-inner">
                        <p class="text-red-500 font-bold text-lg">⚠️ ${i18n[currentLang].noRecord}</p>
                    </div>`;
            }
        }
        
        setLang('th');
    </script>
</body>
</html>
