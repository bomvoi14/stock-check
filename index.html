<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เช็คสต็อกร้านชามโปรด</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>body { font-family: 'Noto Sans Thai', sans-serif; background-color: #f9fafb; }</style>
</head>
<body>
    <script>const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHg49ZFeI0-dBUZIwKznbIo97V1-F_zqz2LdScYdVzyYEr0aD64d3i4k-lkIESZGDZ9A/exec";</script>

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl p-6">
        <h1 class="text-2xl font-bold mb-6 text-center text-amber-600">เช็คสต็อกกล้วยเดียวเรือ</h1>
        
        <div id="home-view" class="grid grid-cols-2 gap-4">
            <button onclick="openStock('ก๋วยเตี๋ยวหมู', '#f59e0b')" class="p-6 rounded-2xl text-white font-bold" style="background:#f59e0b">🍜 ก๋วยเตี๋ยวหมู</button>
            <button onclick="openStock('ก๋วยเตี๋ยวไก่', '#16a34a')" class="p-6 rounded-2xl text-white font-bold" style="background:#16a34a">🍲 ก๋วยเตี๋ยวไก่</button>
            <button onclick="openStock('อาหารตามสั่ง', '#ea580c')" class="p-6 rounded-2xl text-white font-bold" style="background:#ea580c">🥘 อาหารตามสั่ง</button>
            <button onclick="openStock('อุปกรณ์ในร้าน', '#2563eb')" class="p-6 rounded-2xl text-white font-bold" style="background:#2563eb">🔧 อุปกรณ์</button>
        </div>

        <div id="stock-view" class="hidden">
            <button onclick="location.reload()" class="mb-4 text-gray-500">← กลับ</button>
            <input id="staff-name" type="text" placeholder="ชื่อผู้เช็คสต็อก" class="w-full p-3 border rounded-xl mb-4">
            <div id="items-list" class="space-y-3 mb-6"></div>
            <button onclick="saveData()" class="w-full py-4 bg-amber-500 text-white font-bold rounded-xl">บันทึกข้อมูล</button>
        </div>
    </div>

    <script>
        async function openStock(sheet, color) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('stock-view').classList.remove('hidden');
            const res = await fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(sheet)}`);
            const data = await res.json();
            const list = document.getElementById('items-list');
            list.innerHTML = data.slice(1).map((row, i) => `
                <div class="flex items-center justify-between border-b pb-2">
                    <span class="text-sm font-medium">${row[1]}</span>
                    <input type="number" class="w-20 p-2 border rounded-lg qty-input" data-name="${row[1]}" placeholder="0">
                </div>
            `).join('');
        }

        async function saveData() {
            const staff = document.getElementById('staff-name').value;
            if(!staff) return alert('กรุณากรอกชื่อ');
            const items = Array.from(document.querySelectorAll('.qty-input')).filter(i => i.value > 0);
            
            for(let item of items) {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ checked_by: staff, item_name: item.dataset.name, quantity: item.value }) });
            }
            alert('บันทึกสำเร็จ!');
            location.reload();
        }
    </script>
</body>
</html>
