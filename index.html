<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เช็คสต็อกร้านชามโปรด</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
</head>
<body class="bg-gray-50 p-4">
    <script>const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHg49ZFeI0-dBUZIwKznbIo97V1-F_zqz2LdScYdVzyYEr0aD64d3i4k-lkIESZGDZ9A/exec";</script>

    <div class="max-w-2xl mx-auto bg-white p-4 shadow-lg rounded-xl">
        <!-- เมนูหลัก -->
        <div id="home-view" class="space-y-3">
            <h2 class="font-bold text-center mb-4 text-xl text-gray-800">เมนูเช็คสต็อกร้านชามโปรด</h2>
            <button onclick="openStock('ก๋วยเตี๋ยวหมู')" class="w-full p-4 bg-orange-500 text-white rounded-lg font-bold text-lg shadow-md">🍜 ก๋วยเตี๋ยวหมู</button>
            <button onclick="openStock('ก๋วยเตี๋ยวไก่')" class="w-full p-4 bg-green-600 text-white rounded-lg font-bold text-lg shadow-md">🍲 ก๋วยเตี๋ยวไก่</button>
            <button onclick="openStock('อาหารตามสั่ง')" class="w-full p-4 bg-red-600 text-white rounded-lg font-bold text-lg shadow-md">🥘 อาหารตามสั่ง</button>
            <button onclick="openStock('อุปกรณ์ในร้าน')" class="w-full p-4 bg-blue-600 text-white rounded-lg font-bold text-lg shadow-md">🔧 อุปกรณ์ในร้าน</button>
            <button onclick="showHistory()" class="w-full p-4 bg-gray-600 text-white rounded-lg font-bold text-lg shadow-md mt-4">📅 ดูประวัติย้อนหลัง</button>
        </div>

        <!-- หน้าเช็คสต็อก -->
        <div id="stock-view" class="hidden">
            <button onclick="location.reload()" class="mb-4 text-blue-600 font-bold border px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200">← กลับหน้าเมนู</button>
            <input id="staff-name" type="text" placeholder="กรุณากรอกชื่อผู้เช็คสต็อก" class="w-full p-3 border-2 border-gray-300 rounded-lg mb-4 font-bold text-center">
            
            <div class="overflow-x-auto">
                <table class="w-full text-sm border-collapse border border-gray-300">
                    <thead>
                        <tr class="bg-gray-200">
                            <th class="border border-gray-300 p-3 text-left w-1/3">รายการ</th>
                            <th class="border border-gray-300 p-3 text-center">จำนวน</th>
                            <th class="border border-gray-300 p-3 text-center w-1/6">หน่วย</th>
                            <th class="border border-gray-300 p-3 text-left w-1/4">หมายเหตุ</th>
                        </tr>
                    </thead>
                    <tbody id="items-list"></tbody>
                </table>
            </div>
            <button id="save-btn" onclick="saveData()" class="w-full py-4 mt-6 bg-green-600 text-white rounded-lg font-bold text-lg shadow-lg">💾 บันทึกข้อมูล</button>
        </div>

        <!-- หน้าประวัติย้อนหลัง -->
        <div id="history-view" class="hidden">
            <button onclick="location.reload()" class="mb-4 text-blue-600 font-bold border px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200">← กลับหน้าเมนู</button>
            <h3 class="font-bold text-lg mb-2 text-center text-gray-700">ค้นหาประวัติย้อนหลัง</h3>
            
            <!-- ส่วนของตัวกรอง -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-4">
                <input type="date" id="date-picker" onchange="filterHistory()" class="w-full p-3 border-2 border-gray-300 rounded-lg text-center font-bold">
                <select id="shop-filter" onchange="filterHistory()" class="w-full p-3 border-2 border-gray-300 rounded-lg text-center font-bold">
                    <option value="">-- ทุกร้าน --</option>
                </select>
                <select id="staff-filter" onchange="filterHistory()" class="w-full p-3 border-2 border-gray-300 rounded-lg text-center font-bold">
                    <option value="">-- ผู้เช็คทุกคน --</option>
                </select>
            </div>
            
            <div id="history-data" class="text-sm mt-4"></div>
        </div>
    </div>

    <script>
        let currentShop = "";

        // ฟังก์ชันโหลดรายการสินค้า
        async function openStock(sheet) {
            currentShop = sheet;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('stock-view').classList.remove('hidden');
            document.getElementById('items-list').innerHTML = '<tr><td colspan="4" class="text-center p-4 text-gray-500">กำลังโหลดข้อมูล...</td></tr>';
            
            try {
                const res = await fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(sheet)}`);
                const data = await res.json();
                
                document.getElementById('items-list').innerHTML = data.slice(1).filter(r => r[1] && String(r[1]).trim() !== '').map((r, i) => `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3 border border-gray-300 font-medium">${r[1]}</td>
                        <td class="p-3 border border-gray-300">
                            <div class="flex items-center justify-center gap-2">
                                <!-- ปุ่มนอก (ปรับหลักทีละ 1) -->
                                <button onclick="adj(this, -1)" class="w-8 h-8 bg-red-100 text-red-600 rounded font-bold hover:bg-red-200 border border-red-300">-</button>
                                
                                <!-- ช่อง Input (ลูกศรปรับย่อยทีละ 0.1) เพิ่ม min="0" กันติดลบ -->
                                <input type="number" min="0" oninput="if(this.value < 0) this.value = 0;" class="w-20 h-10 text-center border-2 border-gray-300 rounded font-bold text-lg qty-input focus:border-blue-500 focus:outline-none" value="0.0" step="0.1" data-name="${r[1]}" data-unit="${r[2]}">
                                
                                <!-- ปุ่มนอก (ปรับหลักทีละ 1) -->
                                <button onclick="adj(this, 1)" class="w-8 h-8 bg-green-100 text-green-600 rounded font-bold hover:bg-green-200 border border-green-300">+</button>
                            </div>
                        </td>
                        <td class="p-3 border border-gray-300 text-center text-gray-600">${r[2] || '-'}</td>
                        <td class="p-3 border border-gray-300"><input type="text" class="w-full p-2 border rounded focus:border-blue-500 focus:outline-none note-input" placeholder="พิมพ์โน้ต..."></td>
                    </tr>
                `).join('');
            } catch (error) {
                document.getElementById('items-list').innerHTML = '<tr><td colspan="4" class="text-center p-4 text-red-500">เกิดข้อผิดพลาดในการโหลดข้อมูล โปรดตรวจสอบลิงก์อีกครั้ง</td></tr>';
            }
        }

        // ฟังก์ชันสำหรับปุ่มนอก ปรับทีละ 1
        function adj(btn, val) {
            let input = btn.parentElement.querySelector('.qty-input');
            let v = parseFloat(input.value) || 0;
            let result = v + val;
            if (result < 0) result = 0; // ป้องกันค่าติดลบเด็ดขาด
            input.value = result.toFixed(1);
        }

        // ฟังก์ชันบันทึกข้อมูล
        async function saveData() {
            const staff = document.getElementById('staff-name').value.trim();
            if(!staff) {
                alert('⚠️ กรุณากรอกชื่อผู้เช็คสต็อกก่อนบันทึกข้อมูล');
                document.getElementById('staff-name').focus();
                return;
            }

            const btn = document.getElementById('save-btn');
            btn.disabled = true; 
            btn.innerHTML = "⏳ กำลังบันทึกข้อมูล กรุณารอสักครู่...";
            btn.classList.replace('bg-green-600', 'bg-gray-400');
            
            const rows = document.querySelectorAll('#items-list tr');
            const dataToSubmit = [];
            
            rows.forEach(r => {
                const qtyInput = r.querySelector('.qty-input');
                if (qtyInput) {
                    let q = parseFloat(qtyInput.value) || 0;
                    if(q > 0) {
                        dataToSubmit.push({ 
                            checked_by: staff, 
                            station: currentShop,
                            category: "", 
                            item_name: qtyInput.dataset.name, 
                            quantity: q, 
                            unit: qtyInput.dataset.unit, 
                            note: r.querySelector('.note-input').value 
                        });
                    }
                }
            });

            if (dataToSubmit.length === 0) {
                alert('⚠️ ไม่มีรายการสินค้าที่ระบุจำนวน (จำนวนเป็น 0 ทั้งหมด)');
                btn.disabled = false;
                btn.innerHTML = "💾 บันทึกข้อมูล";
                btn.classList.replace('bg-gray-400', 'bg-green-600');
                return;
            }

            try {
                for(let item of dataToSubmit) {
                    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(item) });
                }
                alert('✅ บันทึกข้อมูลเสร็จสมบูรณ์!'); 
                location.reload();
            } catch (error) {
                alert('❌ เกิดข้อผิดพลาดในการบันทึกข้อมูล');
                btn.disabled = false;
                btn.innerHTML = "💾 บันทึกข้อมูล";
                btn.classList.replace('bg-gray-400', 'bg-green-600');
            }
        }

        // ฟังก์ชันดูประวัติ
        async function showHistory() {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('history-view').classList.remove('hidden');
            document.getElementById('history-data').innerHTML = '<p class="text-center p-4 text-gray-500">กำลังดึงข้อมูลประวัติย้อนหลัง กรุณารอสักครู่...</p>';
            
            try {
                const res = await fetch(`${SCRIPT_URL}?sheet=บันทึกสต๊อก`);
                window.histData = await res.json();
                
                // ดึงข้อมูลร้านและพนักงานแบบไม่ซ้ำ เพื่อสร้างตัวเลือกใน Dropdown
                const shops = [...new Set(window.histData.slice(1).map(r => r[2]).filter(Boolean))];
                const staffs = [...new Set(window.histData.slice(1).map(r => r[1]).filter(Boolean))];
                
                document.getElementById('shop-filter').innerHTML = '<option value="">-- ทุกร้าน --</option>' + shops.map(s => `<option value="${s}">${s}</option>`).join('');
                document.getElementById('staff-filter').innerHTML = '<option value="">-- ผู้เช็คทุกคน --</option>' + staffs.map(s => `<option value="${s}">${s}</option>`).join('');
                
                document.getElementById('history-data').innerHTML = '<p class="text-center p-4 text-blue-500">โหลดข้อมูลสำเร็จ กรุณาเลือกเงื่อนไขด้านบนเพื่อดูรายการ</p>';
            } catch (error) {
                document.getElementById('history-data').innerHTML = '<p class="text-center p-4 text-red-500">ดึงประวัติล้มเหลว ตรวจสอบการเชื่อมต่ออินเทอร์เน็ต</p>';
            }
        }

        // ฟังก์ชันกรองประวัติที่ใช้เงื่อนไขได้หลายอันพร้อมกัน
        function filterHistory() {
            if (!window.histData || window.histData.length === 0) return;
            
            const dateVal = document.getElementById('date-picker').value;
            const shopVal = document.getElementById('shop-filter').value;
            const staffVal = document.getElementById('staff-filter').value;
            
            let filtered = window.histData.slice(1);

            // 1. กรองด้วยวันที่ (ถ้ามีการเลือก)
            if (dateVal) {
                const [y, m, d] = dateVal.split('-');
                const yThai = parseInt(y) + 543;
                const dateVariations = [ dateVal, `${d}/${m}/${y}`, `${m}/${d}/${y}`, `${d}/${m}/${yThai}` ];

                filtered = filtered.filter(r => {
                    if (!r[0]) return false;
                    const rowDate = String(r[0]);
                    return dateVariations.some(format => rowDate.includes(format));
                });
            }

            // 2. กรองด้วยร้าน (ถ้ามีการเลือก)
            if (shopVal) {
                filtered = filtered.filter(r => r[2] === shopVal);
            }

            // 3. กรองด้วยชื่อผู้เช็ค (ถ้ามีการเลือก)
            if (staffVal) {
                filtered = filtered.filter(r => r[1] === staffVal);
            }

            // แสดงผลลัพธ์
            if (filtered.length > 0) {
                document.getElementById('history-data').innerHTML = `
                    <div class="overflow-x-auto mt-2">
                        <table class="w-full text-sm border-collapse border border-gray-300">
                            <thead>
                                <tr class="bg-gray-200">
                                    <th class="border border-gray-300 p-2 text-center w-1/4">ร้าน</th>
                                    <th class="border border-gray-300 p-2 text-center w-1/4">ผู้บันทึก</th>
                                    <th class="border border-gray-300 p-2 text-left">รายการ</th>
                                    <th class="border border-gray-300 p-2 text-center">จำนวน</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${filtered.reverse().map(r => `
                                    <tr class="hover:bg-gray-50 border-b">
                                        <td class="border border-gray-300 p-2 text-center font-medium">${r[2] || '-'}</td>
                                        <td class="border border-gray-300 p-2 text-center">${r[1] || '-'}</td>
                                        <td class="border border-gray-300 p-2">
                                            <div class="font-medium">${r[4] || r[2] || '-'}</div>
                                            <div class="text-[10px] text-gray-500">${r[7] || r[5] || ''}</div>
                                        </td>
                                        <td class="border border-gray-300 p-2 text-center font-bold text-blue-600">${r[5] || r[3] || '0'} ${r[6] || r[4] || ''}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>`;
            } else {
                document.getElementById('history-data').innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded p-4 text-center mt-2">
                        <p class="text-red-500 font-bold">ไม่พบรายการบันทึกตามเงื่อนไขที่เลือก</p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
